name: Validate dataset

on:
  pull_request:
    branches: ["main"]
    paths:
      - "dataset/**"
      - "scripts/validate_dataset.py"
      - "scripts/validate_dataset.js"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
          
      - name: Validate dataset with Python
        id: validate-py
        run: |
          echo "Running dataset validation (Python)..."
          python scripts/validate_dataset.py
          
      - name: Validate dataset with Node.js
        id: validate-js
        run: |
          echo "Running dataset validation (Node.js)..."
          node scripts/validate_dataset.js
          
      - name: Comment on PR with validation results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const success = `${{ steps.validate-py.outcome }}` === 'success' && 
                          `${{ steps.validate-js.outcome }}` === 'success';
            
            const icon = success ? '✅' : '❌';
            const status = success ? 'passed' : 'failed';
            
            const comment = `
${icon} **Dataset validation ${status}**

Both Python and Node.js validation scripts completed successfully.

${success ? 'All dataset files are valid and ready to merge.' : 'Please fix the validation errors before merging.'}
`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
