name: Validate dataset

on:
  pull_request:
    branches: ["main"]
    paths:
      - "dataset/**"
      - "scripts/validate_dataset.py"
      - "scripts/validate_dataset.js"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Validate dataset
        id: validate
        run: |
          echo "Running dataset validation..."
          OUTPUT=$(python scripts/validate_dataset.py 2>&1) || true
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Comment on PR with validation results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `${{ steps.validate.outputs.output }}`;
            const success = `${{ steps.validate.outputs.success }}` === 'true';
            
            const icon = success ? '✅' : '❌';
            const status = success ? 'passed' : 'failed';
            
            const comment = `
${icon} **Dataset validation ${status}**

\`\`\`
${output}
\`\`\`

${success ? 'All dataset files are valid.' : 'Please fix the validation errors before merging.'}
`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
            // Set failure if validation failed
            if (!success) {
              core.setFailed('Dataset validation failed');
            }
